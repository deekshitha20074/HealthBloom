<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Health App</title>
    <style>
      body {
        background-color: #d9f9d8;
        font-family: "Times New Roman";
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        background-color: white;
        width: 300px;
        height: 50vh;
        padding: 20px;
        border-radius: 20px;
        text-align: center;
         border: 2px solid #96f39a;
      }
      .container img {
        width: 160px;
        height: 150px;
      }
      .container h1 {
        color: #a9bd67;
        font-size: 20px;
        font-weight: bold;
        color: #405fa4;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 20px;
        color: white;
        font-size: 18px;
        cursor: pointer;
      }
      .btn-login {
        background-color: #48cb8a;
      }
      .btn-create {
        background-color: white;
        color: #96f39a;
        border: 2px solid #96f39a;
      }
      .logo {
        margin-top: 10px;
      }
      .para {
        margin: 0px 0px 50px;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="https://i.ibb.co/0rChLVj/IMG-20241024-WA0013.jpg"
        class="logo"
      />
      <h1 style="margin-bottom: 0">HEALTH BLOOM</h1>
      <p class="para">Where wellness meets Beauty</p>
      <a href="Welcome-page.html" style="text-decoration: none;">
      <button class="btn btn-login">Explore</button>
      </a>
    </div>
  </body>
</html>
