<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Bloom</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #d9f9d8;
        color: #333;
      }

      .main-menu {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        margin-top: 20px;
      }

      .main-menu .card {
        background-color: #fff;
        border: 1px solid #96f39a;
        border-radius: 20px;
        text-align: center;
        padding: 20px;
        box-shadow: 0 10px 15px rgba(72, 203, 138, 0.2);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .main-menu .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 25px rgba(72, 203, 138, 0.3);
      }

      .main-menu .card p {
        font-size: 18px;
        font-weight: bold;
        color: #48cb8a;
      }

      .navbar {
        background-color: #48cb8a;
      }

      .navbar-brand {
        color: #fff;
        font-weight: bold;
      }

      .nav-link {
        color: #fff;
      }

      .nav-link:hover {
        color: #d9f9d8;
      }

      /* Floating Icons */
      .floating-icons {
        position: fixed;
        top: 50%;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        transform: translateY(-50%);
        z-index: 1000;
      }

      .floating-icons a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background-color: #48cb8a;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        transition: background-color 0.3s, transform 0.3s;
        text-decoration: none;
        overflow: hidden;
      }

      .floating-icons a:hover {
        background-color: #3ba375;
        transform: scale(1.1);
      }

      .floating-icons a img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg shadow">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Health Bloom</a>
      </div>
    </nav>

    <!-- Floating Icons -->
    <div class="floating-icons">
      <a href="bmi.html" title="BMI Calculator">
        <img
          src="https://i.ibb.co/ZGKrLYg/bmi-10476437.png"
          alt="BMI Calculator"
        />
      </a>
      <a href="calorie-calculator.html" title="Another Tool">
        <img
          src="https://i.ibb.co/5v6GZCd/IMG-20241231-150659.jpg"
          alt="Another Tool"
        />
      </a>
    </div>

    <!-- Main Menu Section -->
    <div class="container py-4">
      <div class="main-menu">
        <div class="card">
          <a href="healthy-habits-home-page.html" style="text-decoration: none;">
            <img
              src="https://i.ibb.co/mFmT574/IMG-20241214-WA0007.jpg"
              class="img-fluid mb-2"
              alt="Healthy Habits"
            />
            <p>Healthy Habits</p>
          </a>
        </div>
        <div class="card">
          <a href="beauty-tips-home-page.html" style="text-decoration: none;">
            <img
              src="https://i.ibb.co/HDVypvb/IMG-20241213-WA0007.jpg"
              class="img-fluid mb-2"
              alt="Beauty Tips"
            />
            <p>Beauty Tips</p>
          </a>
        </div>
        <div class="card">
          <a href="calorie-home-page.html" style="text-decoration: none;">
            <img
              src="https://i.ibb.co/SR3pWDW/harshi.webp"
              class="img-fluid mb-2"
              alt="Calorie Check"
            />
            <p>Calorie Check</p>
          </a>
        </div>
        <div class="card">
          <a
            href="seasonal-remedies-home-page.html"
            style="text-decoration: none;"
          >
            <img
              src="https://i.ibb.co/vsGtCZq/IMG-20241214-WA0027.jpg"
              class="img-fluid mb-2"
              alt="Seasonal Remedies"
            />
            <p>Seasonal Remedies</p>
          </a>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
