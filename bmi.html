<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #D9F9D8;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #48CB8A;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s ease;
        }

        .back-button:hover {
            background-color: #3BA375;
        }

        .calculator {
            background: white;
            padding: 30px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
            color: #48CB8A;
        }

        .calculator h1 {
            margin-bottom: 20px;
            color: #48CB8A;
        }

        .calculator label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }

        .calculator input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .calculator button {
            background: #48CB8A;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .calculator button:hover {
            background: white;
            color: #48CB8A;
            border: 1px solid #48CB8A;
        }

        #result {
            margin-top: 15px;
            font-size: 1.2em;
            color: #28a745;
        }
    </style>
</head>
<body>
    <!-- Back Button -->
    <a href="Welcome-page.html" class="back-button">Back</a>

    <div class="calculator">
        <h1>BMI Calculator</h1>
        <label for="weight">Weight (kg):</label>
        <input type="number" id="weight" placeholder="Enter weight" required>
        <label for="height">Height (cm):</label>
        <input type="number" id="height" placeholder="Enter height" required>
        <button onclick="calculateBMI()">Calculate</button>
        <p id="result"></p>
    </div>
    <script>
        function calculateBMI() {
            const weight = document.getElementById("weight").value;
            const height = document.getElementById("height").value;

            if (weight && height) {
                const bmi = (weight / ((height / 100) ** 2)).toFixed(2);
                let message = `Your BMI is ${bmi}.`;

                if (bmi < 18.5) {
                    message += " You are underweight.";
                } else if (bmi < 24.9) {
                    message += " You have a normal weight.";
                } else if (bmi < 29.9) {
                    message += " You are overweight.";
                } else {
                    message += " You are obese.";
                }

                document.getElementById("result").innerText = message;
            } else {
                document.getElementById("result").innerText = "Please enter both weight and height.";
            }
        }
    </script>
</body>
</html>
