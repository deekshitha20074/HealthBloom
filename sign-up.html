<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML Login Page with Bootstrap Example</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.1.3/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Muli"
    />
    <style>
      body {
        background: #d9f9d8 !important;
        font-family: "Muli", sans-serif;
      }
      h1 {
        padding-bottom: 2rem;
        font-weight: bold;
      }
      a {
        color: #1987cb;
      }
      a:hover {
        color: #48cb8a;
        text-decoration: none;
      }
      .form-control:focus {
        color: #000;
        background-color: white;
        border: 2px solid #48cb8a;
        outline: 0;
        box-shadow: none;
      }

      .btn {
        background: #48cb8a;
        border: #48cb8a;
      }
      .btn:hover {
        background: #48cb8a;
        border: #48cb8a;
      }
    </style>
  </head>
  <body>
    <div class="pt-5">
      <h1 class="text-center">WELCOME</h1>

      <div class="container">
        <div class="row">
          <div class="col-md-5 mx-auto">
            <div class="card card-body">
              <form
                id="submitForm"
                action="sign-up.php" <!-- Updated to point to signup.php -->
               
                <!-- Username Field -->
                <div class="form-group required">
                  <label for="username">Username</label>
                  <input
                    type="text"
                    class="form-control text-lowercase"
                    id="username"
                    name="username"
                    required
                  />
                </div>
                
                <!-- Email Field -->
                <div class="form-group required">
                  <label for="email">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    required
                  />
                </div>
                
                <!-- Password Field -->
                <div class="form-group required">
                  <label for="password">Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    required
                  />
                </div>
                
                <!-- Confirm Password Field -->
                <div class="form-group required">
                  <label for="confirm-password">Confirm Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="confirm-password"
                    name="confirm_password" <!-- Ensure this matches PHP variable -->
                </div>

                <!-- Remember Me -->
                <div class="form-group mt-4 mb-4">
                  <div class="custom-control custom-checkbox">
                    <input
                      type="checkbox"
                      class="custom-control-input"
                      id="remember-me"
                      name="remember-me"
                    />
                    <label class="custom-control-label" for="remember-me">
                      Remember me?
                    </label>
                  </div>
                </div>

                <!-- Submit Button -->
                <div class="form-group pt-1">
                  <button class="btn btn-primary btn-block" type="submit">
                    Create Account
                  </button>
                </div>
              </form>
              <p class="small-xl pt-3 text-center">
                <span class="text-muted">Already have an account?</span>
                <a href="admin-login.html">Log in</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
