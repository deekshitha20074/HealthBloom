<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Bloom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f9f9f9; /* Light background */
            font-family: Arial, sans-serif;
        }
        .carousel-item {
            text-align: center;
            background-color: #f0f8ff; /* Alice blue background for carousel */
            border-radius: 10px;
            padding: 20px;
        }
        .main-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .menu-card {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .menu-card:hover {
            transform: scale(1.05);
        }
        /* Color hex codes from your file */
        .bg-blue { background-color: #007bff; color: white; } /* Primary blue */
        .bg-yellow { background-color: #ffc107; color: black; } /* Yellow */
        .bg-green { background-color: #28a745; color: white; } /* Green */
        .bg-red { background-color: #dc3545; color: white; } /* Red */
        .carousel-text {
            color: #333; /* Neutral text color */
        }
    </style>
</head>
<body>

    <!-- Carousel Section -->
    <div id="carouselExample" class="carousel slide mt-4" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <h3 class="carousel-text">Calorie Calculator</h3>
                <img src="calorie-image.jpg" alt="Calorie Calculator" class="img-fluid">
                <p class="carousel-text">Track your daily calorie intake effortlessly.</p>
                <a href="CalorieCheck.html" class="btn btn-primary">Learn More</a>
            </div>
            <div class="carousel-item">
                <h3 class="carousel-text">BMI Calculator</h3>
                <img src="bmi-image.jpg" alt="BMI Calculator" class="img-fluid">
                <p class="carousel-text">Check your Body Mass Index for a healthier you.</p>
                <a href="BMI.html" class="btn btn-primary">Learn More</a>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- Main Menu Section -->
    <div class="container mt-4">
        <div class="main-menu">
            <a href="BeautyTips.html" class="menu-card bg-blue">Beauty Tips</a>
            <a href="SeasonalRemedies.html" class="menu-card bg-yellow">Seasonal Remedies</a>
            <a href="CalorieCheck.html" class="menu-card bg-green">Calorie Check</a>
            <a href="HealthyHabits.html" class="menu-card bg-red">Healthy Habits</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
